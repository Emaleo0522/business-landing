<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- About Section: Collaboration / Technology Illustration -->

  <!-- Background subtle grid -->
  <g opacity="0.06">
    <pattern id="aboutGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2563eb" stroke-width="0.5"/>
    </pattern>
    <rect x="100" y="80" width="600" height="440" rx="20" fill="url(#aboutGrid)"/>
  </g>

  <!-- Central hub circle -->
  <circle cx="400" cy="300" r="60" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="300" r="40" fill="#2563eb" opacity="0.15"/>

  <!-- Hub icon (interconnected nodes) -->
  <g transform="translate(400,300)">
    <circle cx="0" cy="-15" r="6" fill="#2563eb"/>
    <circle cx="13" cy="8" r="6" fill="#2563eb"/>
    <circle cx="-13" cy="8" r="6" fill="#2563eb"/>
    <line x1="0" y1="-15" x2="13" y2="8" stroke="#2563eb" stroke-width="2"/>
    <line x1="13" y1="8" x2="-13" y2="8" stroke="#2563eb" stroke-width="2"/>
    <line x1="-13" y1="8" x2="0" y2="-15" stroke="#2563eb" stroke-width="2"/>
  </g>

  <!-- Person 1 - Top Left -->
  <g transform="translate(180, 180)">
    <!-- Body -->
    <circle cx="0" cy="-20" r="22" fill="#0f172a" opacity="0.12"/>
    <circle cx="0" cy="-20" r="16" fill="#2563eb" opacity="0.2"/>
    <!-- Head -->
    <circle cx="0" cy="-38" r="12" fill="#2563eb" opacity="0.35"/>
    <!-- Shoulders -->
    <path d="M -18 -8 Q 0 8 18 -8" stroke="#2563eb" stroke-width="2.5" fill="none" opacity="0.3"/>
    <!-- Device/laptop -->
    <rect x="-14" y="4" width="28" height="18" rx="3" fill="#0f172a" opacity="0.15" stroke="#0f172a" stroke-width="1" opacity="0.2"/>
    <rect x="-10" y="7" width="20" height="11" rx="1" fill="#2563eb" opacity="0.1"/>
  </g>

  <!-- Connection line from person 1 to hub -->
  <line x1="210" y1="195" x2="365" y2="280" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.25"/>
  <circle cx="288" cy="238" r="3" fill="#f59e0b" opacity="0.5"/>

  <!-- Person 2 - Top Right -->
  <g transform="translate(620, 180)">
    <circle cx="0" cy="-20" r="22" fill="#0f172a" opacity="0.12"/>
    <circle cx="0" cy="-20" r="16" fill="#f59e0b" opacity="0.15"/>
    <circle cx="0" cy="-38" r="12" fill="#f59e0b" opacity="0.3"/>
    <path d="M -18 -8 Q 0 8 18 -8" stroke="#f59e0b" stroke-width="2.5" fill="none" opacity="0.25"/>
    <!-- Chart/analytics icon -->
    <g transform="translate(-12, 6)">
      <rect width="24" height="18" rx="3" fill="#0f172a" opacity="0.12" stroke="#0f172a" stroke-width="1" opacity="0.2"/>
      <rect x="4" y="12" width="4" height="4" fill="#f59e0b" opacity="0.4"/>
      <rect x="10" y="8" width="4" height="8" fill="#2563eb" opacity="0.4"/>
      <rect x="16" y="5" width="4" height="11" fill="#f59e0b" opacity="0.3"/>
    </g>
  </g>

  <!-- Connection line from person 2 to hub -->
  <line x1="590" y1="195" x2="435" y2="280" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.2"/>
  <circle cx="512" cy="238" r="3" fill="#2563eb" opacity="0.5"/>

  <!-- Person 3 - Bottom Left -->
  <g transform="translate(200, 440)">
    <circle cx="0" cy="-20" r="22" fill="#0f172a" opacity="0.12"/>
    <circle cx="0" cy="-20" r="16" fill="#2563eb" opacity="0.18"/>
    <circle cx="0" cy="-38" r="12" fill="#2563eb" opacity="0.3"/>
    <path d="M -18 -8 Q 0 8 18 -8" stroke="#2563eb" stroke-width="2.5" fill="none" opacity="0.25"/>
    <!-- Code icon -->
    <g transform="translate(-12, 6)">
      <rect width="24" height="18" rx="3" fill="#0f172a" opacity="0.12" stroke="#0f172a" stroke-width="1" opacity="0.2"/>
      <text x="12" y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#2563eb" opacity="0.5">&lt;/&gt;</text>
    </g>
  </g>

  <!-- Connection from person 3 to hub -->
  <line x1="225" y1="420" x2="370" y2="325" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.25"/>
  <circle cx="298" cy="372" r="3" fill="#f59e0b" opacity="0.5"/>

  <!-- Person 4 - Bottom Right -->
  <g transform="translate(600, 440)">
    <circle cx="0" cy="-20" r="22" fill="#0f172a" opacity="0.12"/>
    <circle cx="0" cy="-20" r="16" fill="#f59e0b" opacity="0.12"/>
    <circle cx="0" cy="-38" r="12" fill="#0f172a" opacity="0.25"/>
    <path d="M -18 -8 Q 0 8 18 -8" stroke="#0f172a" stroke-width="2.5" fill="none" opacity="0.2"/>
    <!-- Lightbulb/idea icon -->
    <g transform="translate(-8, 4)">
      <circle cx="8" cy="6" r="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
      <line x1="8" y1="2" x2="8" y2="10" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
      <line x1="4" y1="6" x2="12" y2="6" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    </g>
  </g>

  <!-- Connection from person 4 to hub -->
  <line x1="575" y1="420" x2="430" y2="325" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.15"/>
  <circle cx="502" cy="372" r="3" fill="#2563eb" opacity="0.5"/>

  <!-- Orbiting elements around hub -->
  <g opacity="0.2">
    <circle cx="400" cy="300" r="100" stroke="#2563eb" stroke-width="1" fill="none" stroke-dasharray="4 8"/>
    <circle cx="400" cy="300" r="150" stroke="#0f172a" stroke-width="0.5" fill="none" stroke-dasharray="2 10"/>
  </g>

  <!-- Floating data/tech elements -->
  <g opacity="0.15">
    <!-- Gear top -->
    <circle cx="400" cy="200" r="14" stroke="#2563eb" stroke-width="2" fill="none"/>
    <circle cx="400" cy="200" r="6" fill="#2563eb"/>

    <!-- Shield right -->
    <path d="M 500 300 L 500 280 Q 515 275 530 280 L 530 300 Q 515 315 500 300Z" fill="#0f172a" opacity="0.6"/>

    <!-- Lightning left -->
    <path d="M 300 295 L 310 280 L 305 295 L 315 295 L 305 315 L 310 300 Z" fill="#f59e0b" opacity="0.6"/>

    <!-- Cloud bottom -->
    <path d="M 380 390 Q 380 375 395 375 Q 400 365 415 375 Q 425 375 425 390 Z" fill="#2563eb" opacity="0.4"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#2563eb" stroke-width="1.5" opacity="0.1">
    <path d="M 50 50 L 50 100 M 50 50 L 100 50"/>
    <path d="M 750 50 L 750 100 M 750 50 L 700 50"/>
    <path d="M 50 550 L 50 500 M 50 550 L 100 550"/>
    <path d="M 750 550 L 750 500 M 750 550 L 700 550"/>
  </g>
</svg>
