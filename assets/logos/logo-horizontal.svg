<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <!-- Icon: Compact stylized N -->
  <g transform="translate(3, 4)">
    <!-- N structure lines -->
    <line x1="3" y1="29" x2="3" y2="3" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="3" y1="3" x2="26" y2="29" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="26" y1="29" x2="26" y2="3" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Cross-connections -->
    <line x1="3" y1="16" x2="14.5" y2="16" stroke="#2563eb" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
    <line x1="14.5" y1="16" x2="26" y2="16" stroke="#2563eb" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
    <!-- Nodes -->
    <circle cx="3" cy="3" r="2.8" fill="#2563eb"/>
    <circle cx="3" cy="29" r="2.8" fill="#2563eb"/>
    <circle cx="26" cy="3" r="2.8" fill="#2563eb"/>
    <circle cx="26" cy="29" r="2.8" fill="#2563eb"/>
    <circle cx="14.5" cy="16" r="3" fill="#2563eb"/>
    <circle cx="3" cy="16" r="1.8" fill="#2563eb" opacity="0.6"/>
    <circle cx="26" cy="16" r="1.8" fill="#2563eb" opacity="0.6"/>
  </g>
  <!-- Text: NexaCorp -->
  <text x="40" y="27" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a" letter-spacing="-0.3">
    <tspan>Nexa</tspan><tspan fill="#2563eb">Corp</tspan>
  </text>
</svg>