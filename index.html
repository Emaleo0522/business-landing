    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What services does NexaCorp offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer a comprehensive suite of technology services including custom software development, data analytics, cybersecurity, strategic consulting, team augmentation, and cloud solutions. Each service is tailored to meet your specific business needs."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a typical project take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Project timelines vary based on scope and complexity. A typical project ranges from 4-12 weeks. During our initial consultation, we provide a detailed timeline with milestones so you always know what to expect."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with startups or only enterprises?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We work with businesses of all sizes, from early-stage startups to Fortune 500 enterprises. Our flexible engagement models allow us to scale our services to match your needs and budget."
          }
        },
        {
          "@type": "Question",
          "name": "What is your pricing model?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer flexible pricing including fixed-price projects, monthly retainers, and time-and-materials engagements. Our plans page gives a starting point, but we customize proposals based on your specific requirements."
          }
        },
        {
          "@type": "Question",
          "name": "How do you ensure project quality?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Quality is built into every step of our process. We use agile methodologies, automated testing, code reviews, and continuous integration. Every project includes dedicated QA resources and regular client check-ins."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after the project is delivered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We provide ongoing support and maintenance packages to ensure your solution continues to perform optimally. This includes bug fixes, performance monitoring, feature updates, and 24/7 emergency support."
          }
        }
      ]
    }
    </script>
