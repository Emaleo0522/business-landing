<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Icon: Stylized N with connected nodes - standalone -->
  <g transform="translate(4, 4)">
    <!-- N structure lines -->
    <line x1="4" y1="36" x2="4" y2="4" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <line x1="4" y1="4" x2="36" y2="36" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="36" x2="36" y2="4" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <!-- Cross-connections -->
    <line x1="4" y1="20" x2="20" y2="20" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="20" x2="36" y2="20" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <!-- Primary nodes -->
    <circle cx="4" cy="4" r="3.5" fill="#2563eb"/>
    <circle cx="4" cy="36" r="3.5" fill="#2563eb"/>
    <circle cx="36" cy="4" r="3.5" fill="#2563eb"/>
    <circle cx="36" cy="36" r="3.5" fill="#2563eb"/>
    <circle cx="20" cy="20" r="4" fill="#2563eb"/>
    <!-- Secondary nodes -->
    <circle cx="4" cy="20" r="2.5" fill="#2563eb" opacity="0.6"/>
    <circle cx="36" cy="20" r="2.5" fill="#2563eb" opacity="0.6"/>
  </g>
</svg>