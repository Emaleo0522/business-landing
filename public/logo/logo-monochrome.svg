<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Icon: Stylized N with connected nodes - white monochrome -->
  <g transform="translate(5, 5)">
    <!-- N structure lines -->
    <line x1="4" y1="36" x2="4" y2="4" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="4" x2="32" y2="36" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="36" x2="32" y2="4" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Cross-connections -->
    <line x1="4" y1="20" x2="18" y2="20" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="18" y1="20" x2="32" y2="20" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Nodes -->
    <circle cx="4" cy="4" r="3" fill="#ffffff"/>
    <circle cx="4" cy="36" r="3" fill="#ffffff"/>
    <circle cx="32" cy="4" r="3" fill="#ffffff"/>
    <circle cx="32" cy="36" r="3" fill="#ffffff"/>
    <circle cx="18" cy="20" r="3.5" fill="#ffffff"/>
    <circle cx="4" cy="20" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="32" cy="20" r="2" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Text: NexaCorp - all white -->
  <text x="52" y="33" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="-0.5">NexaCorp</text>
</svg>